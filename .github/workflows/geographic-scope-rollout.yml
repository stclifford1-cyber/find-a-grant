name: Geographic scope rollout

on:
  workflow_dispatch:

jobs:
  migrate-and-backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Verify production database secret
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "DATABASE_URL repository secret is required for the production migration."
            exit 1
          fi

      - name: Apply geographic scope migration
        run: python -m scripts.migrate

      - name: Backfill geographic scope
        run: python -m scripts.backfill_geographic_scope

      - name: Verify geographic scope after backfill
        run: python -m scripts.migrate
